# M-flow documentation issue form
name: "Docs Improvement"
description: "Report incorrect, missing, or unclear documentation"
title: "[docs] "
labels:
  - docs
body:
  - type: markdown
    attributes:
      value: >
        Help us improve M-flow's documentation.
        Provide as much detail as possible so we can fix or expand the docs.

  - type: dropdown
    id: kind
    attributes:
      label: Issue kind
      options:
        - Incorrect / outdated information
        - Missing topic or API reference
        - Hard to understand
        - Typo or formatting
        - New guide / tutorial request
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Page URL or file path
      description: "Link to the affected file path in this repo or on GitHub."
      placeholder: "https://github.com/FlowElement-ai/m_flow#quick-start"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What needs to change?
      description: >
        Explain what is wrong or missing and, if possible,
        suggest corrected wording or an outline for new content.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this has not been reported
          required: true
