# M-flow bug report issue form
name: "Bug Report"
description: "Something isn't working as expected"
title: "[bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: >
        Thank you for reporting a bug in **M-flow**.
        Fill in the sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: >
        Describe the bug concisely. Include expected vs actual behaviour.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Install m_flow v…
        2. Run `m_flow.add(…)`
        3. Call `m_flow.memorize()`
        4. Observe error …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: M-flow version
      description: "Output of `pip show m_flow | grep Version`"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (other)
        - Windows
        - Docker container
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.6"
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error traceback / logs
      render: python
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, config snippets, related issues, etc.
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched open issues and this has not been reported yet
          required: true
