# M-flow feature request form
name: "Feature Request"
description: "Propose a new capability for M-flow"
title: "[feat] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: >
        We appreciate feature ideas! Please fill in the sections below so
        the team can evaluate feasibility and priority.

  - type: dropdown
    id: area
    attributes:
      label: Component
      description: Which part of M-flow does this relate to?
      options:
        - Core pipeline (add / memorize / search)
        - API / server
        - Infrastructure (DB, embeddings, LLM)
        - CLI
        - Frontend / console
        - MCP server
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: >
        Why do you need this? Describe the pain point or use case.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        How should the feature work? Include API sketches,
        pseudocode, or diagrams if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, etc.
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have checked existing issues and this feature has not been requested
          required: true
