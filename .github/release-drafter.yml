# Release Drafter — M-flow
# Generates draft release notes on every push to main.

name-template: "M-flow v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["bug", "fix", "chore", "docs"]
  default: patch

categories:
  - title: "🚀 New Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["bug", "fix"]
  - title: "🔧 Maintenance & CI"
    labels: ["chore", "refactor", "ci", "dependencies"]
  - title: "📝 Documentation"
    labels: ["docs"]

exclude-labels:
  - "skip-changelog"

change-template: "- $TITLE by @$AUTHOR (#$NUMBER)"

template: |
  ## M-flow $RESOLVED_VERSION

  ### Changes

  $CHANGES

  **Full Changelog**: https://github.com/FlowElement-ai/m_flow/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
