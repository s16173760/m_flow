# ┌──────────────────────────────────────────────────────────────────────────┐
# │ M-Flow CI Pipeline: Vector Database Provider Verification               │
# │                                                                          │
# │ Validates embedding storage and retrieval against each supported vector │
# │ backend: PostgreSQL/PGVector and LanceDB. ChromaDB support is currently │
# │ suspended and will be re-enabled when the integration is stabilised.    │
# │                                                                          │
# │ Owner: M-Flow Platform Engineering                                      │
# └──────────────────────────────────────────────────────────────────────────┘
name: "vector-db | Embedding Store Verification"

on:
  workflow_call:
    inputs:
      databases:
        type: string
        default: "all"
        required: false
        description: "Vector backends to test (comma-separated or 'all')"
    secrets:
      POSTGRES_PASSWORD: {required: false}

concurrency:
  group: mflow-vecdb-${{ github.ref }}
  cancel-in-progress: true

jobs:

