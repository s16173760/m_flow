  #       run: uv run python ./m_flow/tests/test_chromadb.py

  # ── PGVector embedding store ───────────────────────────────────────────
  pgvector-assertions:
    if: ${{ inputs.databases == 'all' || contains(inputs.databases, 'postgres') }}
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    name: "pgvector-embedding-store"
    defaults: {run: {shell: bash}}
    env:
      ENV: 'dev'
      ENABLE_BACKEND_ACCESS_CONTROL: 'false'
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: "${{ secrets.POSTGRES_PASSWORD }}", POSTGRES_DB: m_flow_db}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "postgres"}

      - name: "Execute PGVector assertions"
        run: uv run python ./m_flow/tests/test_pgvector.py

  # ── LanceDB embedding store ────────────────────────────────────────────
  lancedb-assertions:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    name: "lancedb-embedding-store"
    defaults: {run: {shell: bash}}
    env:
      ENV: 'dev'
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - name: "Execute LanceDB assertions"
        run: uv run python ./m_flow/tests/test_lancedb.py
