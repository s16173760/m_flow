# M-Flow CI — end-to-end integration tests: server, telemetry, deduplication, caching, and more.
# Validates the full pipeline across multiple functional domains in isolation.
name: "e2e-gate | End-to-End Functional Tests"

permissions: {contents: read}

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11.x'
    secrets:
      LLM_MODEL: {required: true}
      LLM_ENDPOINT: {required: true}
      LLM_API_KEY: {required: true}
      LLM_API_VERSION: {required: true}
      EMBEDDING_MODEL: {required: true}
      EMBEDDING_ENDPOINT: {required: true}
      EMBEDDING_API_KEY: {required: true}
      EMBEDDING_API_VERSION: {required: true}
      OPENAI_API_KEY: {required: true}
      AWS_ACCESS_KEY_ID: {required: true}
      AWS_SECRET_ACCESS_KEY: {required: true}

jobs:

  server-boot:
    runs-on: ubuntu-22.04
    name: "Server startup validation"
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
        with: {fetch-depth: 0}

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Assert server starts cleanly
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_m_flow_server_start.py

  telemetry-unit:
    runs-on: ubuntu-22.04
    name: "Telemetry subsystem check"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Assert telemetry hooks fire correctly
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_telemetry.py

  telemetry-pipeline:
    runs-on: ubuntu-22.04
    name: "Telemetry with live pipeline"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Write anonymous telemetry identifier
        run: |
          echo "test-machine" > .anon_id

      - name: Run pipeline with telemetry active
        env:
          ENV: 'local'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_library.py

  dedup-validation:
    runs-on: ubuntu-latest
    name: "Deduplication logic (PGVector)"
    defaults:
      run: {shell: bash}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: m_flow, POSTGRES_DB: m_flow_db}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'
          extra-dependencies: "postgres"

      - name: Assert deduplication produces correct results
        env:
          ENV: 'dev'
          ENABLE_BACKEND_ACCESS_CONTROL: 'false'
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_deduplication.py

  s3-storage:
    runs-on: ubuntu-22.04
    name: "S3 bucket read/write"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'
          extra-dependencies: "aws"

      - name: Validate S3 storage operations
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: uv run python ./m_flow/tests/test_s3.py

  parallel-db-access:
    runs-on: ubuntu-22.04
    name: "Concurrent async database usage"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Confirm dependency resolution
        run: echo "Dependencies already installed in setup"

      - name: Verify parallel database operations
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_parallel_databases.py

  dataset-handler:
    runs-on: ubuntu-22.04
    name: "Dataset DB handler assertions"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
