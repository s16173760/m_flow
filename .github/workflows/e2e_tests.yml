          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_dataset_delete.py

  permissions-scenarios:
    runs-on: ubuntu-22.04
    name: "Permission boundary verification"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Confirm dependency resolution
        run: echo "Dependencies already installed in setup"

      - name: Exercise permission scenarios
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_permissions.py

  multi-tenancy-scenarios:
    runs-on: ubuntu-22.04
    name: "Multi-tenant isolation check"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
