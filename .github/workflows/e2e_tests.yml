          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/tests/test_edge_ingestion.py

  concurrent-subprocess-access:
    runs-on: ubuntu-latest
    name: "Subprocess concurrency (Kuzu + Redis)"
    defaults:
      run: {shell: bash}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: m_flow, POSTGRES_DB: m_flow_db}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'
          extra-dependencies: "postgres redis"

      - name: Validate concurrent subprocess access (Kuzu/Lancedb/Postgres/Redis)
        env:
          ENV: dev
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: 'kuzu'
          CACHING: true
          CACHE_BACKEND: 'redis'
          SHARED_KUZU_LOCK: true
          DB_PROVIDER: 'postgres'
          DB_NAME: 'm_flow_db'
          DB_HOST: '127.0.0.1'
          DB_PORT: 5432
          DB_USERNAME: m_flow
          DB_PASSWORD: m_flow
        run: uv run python ./m_flow/tests/test_concurrent_subprocess_access.py

  concept-extraction:
    runs-on: ubuntu-22.04
    name: "Concept extraction accuracy"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
