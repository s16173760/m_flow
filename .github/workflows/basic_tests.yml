# ┌──────────────────────────────────────────────────────────────────────────┐
# │ M-Flow CI Pipeline: Core Quality Gates                                  │
# │                                                                          │
# │ First line of defence for every PR — runs static analysis, unit tests,  │
# │ integration tests, and example smoke tests. Test jobs are gated behind  │
# │ a mandatory static-analysis pass to fail fast on formatting issues.     │
# │                                                                          │
# │ Owner: M-Flow Platform Engineering                                      │
# └──────────────────────────────────────────────────────────────────────────┘
name: "basic-gate | Lint, Unit & Integration Tests"

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.11.x'
        required: false
    secrets:
      LLM_PROVIDER: {required: true}
      LLM_MODEL: {required: true}
      LLM_ENDPOINT: {required: true}
      LLM_API_KEY: {required: true}
      LLM_API_VERSION: {required: true}
      EMBEDDING_PROVIDER: {required: true}
      EMBEDDING_MODEL: {required: true}
      EMBEDDING_ENDPOINT: {required: true}
      EMBEDDING_API_KEY: {required: true}
      EMBEDDING_API_VERSION: {required: true}

permissions: {contents: read}

env: {RUNTIME__LOG_LEVEL: ERROR, ENV: 'dev'}

concurrency:
  group: mflow-basic-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Stage 1: static analysis (combined lint + format) ──────────────────
  static-analysis:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    name: "Ruff static analysis & format verification"
    defaults: {run: {shell: bash}}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - name: "Run ruff lint"
        uses: astral-sh/ruff-action@v2

      - name: "Verify code formatting"
        uses: astral-sh/ruff-action@v2
        with: {args: "format --check"}

  # ── Stage 2: test suites (gated behind static-analysis) ────────────────
  unit-suite:
    needs: [static-analysis]
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    name: "Unit test execution"
    defaults: {run: {shell: bash}}
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - name: "Execute unit tests"
        run: uv run pytest m_flow/tests/unit/

  integration-suite:
    needs: [static-analysis]
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    name: "Integration test execution"
    defaults: {run: {shell: bash}}
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "scraping"}

      - name: "Execute integration tests"
        run: uv run pytest m_flow/tests/integration/

  # ── Stage 3: example smoke tests ──────────────────────────────────────
  smoke-test-standard:
    needs: [static-analysis]
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    name: "Smoke-test standard examples"
    defaults: {run: {shell: bash}}
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - name: "Run basic example script"
        run: uv run python ./examples/python/simple_example.py

  smoke-test-baml:
    needs: [static-analysis]
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    name: "Smoke-test BAML-backed examples"
    defaults: {run: {shell: bash}}
    env:
      STRUCTURED_OUTPUT_FRAMEWORK: "BAML"
      BAML_LLM_PROVIDER: openai
      BAML_LLM_MODEL: ${{ secrets.OPENAI_MODEL }}
      BAML_LLM_ENDPOINT: ${{ secrets.OPENAI_ENDPOINT }}
      BAML_LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: openai
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "baml"}

      - name: "Run BAML example script"
        run: uv run python ./examples/python/simple_example.py
