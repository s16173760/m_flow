# M-Flow — pre-flight checks.
# Validates the uv lockfile is consistent before heavier test suites run.
name: "pre-flight | Lockfile & Dependency Checks"

on:
  workflow_call:

permissions: {contents: read}

jobs:

  uv-lock-integrity:
    runs-on: ubuntu-latest
    name: "Assert uv.lock is up-to-date"
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
        with: {fetch-depth: 0}

      - name: Provision uv toolchain
        uses: astral-sh/setup-uv@v4
        with: {enable-cache: true}

      - name: Verify lockfile consistency
        run: |
          uv lock --check || {
            echo "::error::uv.lock is out of date. Run 'uv lock' locally and push."
            exit 1
          }
