# M-Flow CI: validates Python example scripts — multimedia, eval, ontology, pipelines, etc.
# Each example is isolated in its own job to surface failures precisely.
name: "examples | Demo Script Validation Suite"

permissions: {contents: read}

on:
  workflow_call:

jobs:

  multimedia-demo:
    runs-on: ubuntu-22.04
    name: "Multimedia ingestion demo"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Validate multimedia example script
        env:
          ENV: 'dev'
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python ./examples/python/multimedia_example.py

  eval-framework-demo:
    runs-on: ubuntu-22.04
    name: "Evaluation framework demo"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'
          extra-dependencies: "deepeval"

      - name: Validate evaluation framework script
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
        run: uv run python ./m_flow/eval_framework/run_eval.py

  descriptive-graph-metrics:
    runs-on: ubuntu-22.04
    name: "Neo4j descriptive metrics demo"
    steps:
      - name: Pull source tree
        uses: actions/checkout@v4

      - name: Bootstrap M-Flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: '3.11.x'

      - name: Provision Neo4j + GDS plugin
        uses: ./.github/actions/setup_neo4j
        id: neo4j

      - name: Validate descriptive graph metrics script
        env:
          ENV: 'dev'
          ENABLE_BACKEND_ACCESS_CONTROL: 'false'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: "neo4j"
          GRAPH_DATABASE_URL: ${{ steps.neo4j.outputs.neo4j-url }}
          GRAPH_DATABASE_USERNAME: ${{ steps.neo4j.outputs.neo4j-username }}
          GRAPH_DATABASE_PASSWORD: ${{ steps.neo4j.outputs.neo4j-password }}
        run: uv run python ./m_flow/tests/tasks/descriptive_metrics/neo4j_metrics_test.py

  dynamic-steps-demo:
    runs-on: ubuntu-22.04
