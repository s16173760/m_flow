# ┌──────────────────────────────────────────────────────────────────────────┐
# │ M-Flow CI Pipeline: Temporal Graph Feature Validation                   │
# │                                                                          │
# │ Exercises Kuzu/Neo4j × LanceDB/PGVector × SQLite/Postgres permutations │
# │ for the temporal-graph feature. Organised into three tiers:             │
# │   - sqlite-stack: lightweight combos (no service containers)            │
# │   - pg-kuzu-stack: Kuzu + PGVector + Postgres                          │
# │   - pg-neo4j-stack: Neo4j + PGVector + Postgres (dual services)        │
# │                                                                          │
# │ Owner: M-Flow Platform Engineering                                      │
# └──────────────────────────────────────────────────────────────────────────┘
name: "temporal-graph | Time-Aware Graph Validation"

permissions: {contents: read}

on:
  workflow_call:
    inputs:
      databases:
        type: string
        default: "all"
        required: false
        description: "Storage combos to exercise (comma-separated or 'all')"

concurrency:
  group: mflow-temporal-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Tier 1: SQLite-based stack (Kuzu or Neo4j + LanceDB + SQLite) ─────
  sqlite-stack:
    if: >-
      ${{ inputs.databases == 'all'
       || contains(inputs.databases, format('{0}/lance/sqlite', matrix.graph_engine)) }}
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    name: "${{ matrix.graph_engine }} + LanceDB + SQLite temporal pipeline"
    defaults: {run: {shell: bash}}
    strategy:
      fail-fast: false
      matrix:
        graph_engine: [kuzu, neo4j]
    env:
      ENV: 'dev'
      LLM_MODEL: ${{ secrets.OPENAI_MODEL }}
      LLM_ENDPOINT: ${{ secrets.OPENAI_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      GRAPH_DATABASE_PROVIDER: ${{ matrix.graph_engine }}
      VECTOR_DB_PROVIDER: 'lancedb'
      DB_PROVIDER: 'sqlite'
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - uses: ./.github/actions/setup_neo4j
        name: "Provision Neo4j with GDS extension"
        id: neo4j_svc
        if: matrix.graph_engine == 'neo4j'

      - run: echo "Dependencies already installed in setup"
        name: "Confirm dependency resolution"
        if: matrix.graph_engine == 'kuzu'

      - name: "Execute temporal graph — ${{ matrix.graph_engine }} / LanceDB / SQLite"
        env:
          ENABLE_BACKEND_ACCESS_CONTROL: >-
            ${{ matrix.graph_engine == 'neo4j' && 'false' || '' }}
          GRAPH_DATABASE_URL: >-
            ${{ matrix.graph_engine == 'neo4j' && steps.neo4j_svc.outputs.neo4j-url || '' }}
          GRAPH_DATABASE_USERNAME: >-
            ${{ matrix.graph_engine == 'neo4j' && steps.neo4j_svc.outputs.neo4j-username || '' }}
          GRAPH_DATABASE_PASSWORD: >-
            ${{ matrix.graph_engine == 'neo4j' && steps.neo4j_svc.outputs.neo4j-password || '' }}
        run: uv run python ./m_flow/tests/test_temporal_graph.py

  # ── Tier 2: Kuzu + PGVector + Postgres ─────────────────────────────────
  pg-kuzu-stack:
    if: ${{ inputs.databases == 'all' || contains(inputs.databases, 'kuzu/pgvector/postgres') }}
    timeout-minutes: 25
    runs-on: ubuntu-22.04
    name: "Kuzu + PGVector + Postgres temporal pipeline"
    defaults: {run: {shell: bash}}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: m_flow, POSTGRES_DB: m_flow_db}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    env:
      ENV: dev
      ENABLE_BACKEND_ACCESS_CONTROL: 'false'
      LLM_MODEL: ${{ secrets.OPENAI_MODEL }}
      LLM_ENDPOINT: ${{ secrets.OPENAI_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      GRAPH_DATABASE_PROVIDER: 'kuzu'
      VECTOR_DB_PROVIDER: 'pgvector'
      DB_PROVIDER: 'postgres'
      DB_NAME: 'm_flow_db'
      DB_HOST: '127.0.0.1'
      DB_PORT: 5432
      DB_USERNAME: m_flow
      DB_PASSWORD: m_flow
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "postgres"}

      - run: echo "Dependencies already installed in setup"
        name: "Confirm dependency resolution"

      - name: "Execute temporal graph — Kuzu / PGVector / Postgres"
        run: uv run python ./m_flow/tests/test_temporal_graph.py

  # ── Tier 3: Neo4j + PGVector + Postgres (dual service containers) ──────
  pg-neo4j-stack:
    if: ${{ inputs.databases == 'all' || contains(inputs.databases, 'neo4j/pgvector/postgres') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    name: "Neo4j + PGVector + Postgres temporal pipeline"
    defaults: {run: {shell: bash}}
    services:
      neo4j:
        image: neo4j:5.11
        env:
          NEO4J_AUTH: neo4j/mflow-dev-neo4j
          NEO4J_PLUGINS: '["apoc","graph-data-science"]'
        ports: ["7474:7474", "7687:7687"]
        options: >-
          --health-cmd="cypher-shell -u neo4j -p mflow-dev-neo4j 'RETURN 1'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: m_flow, POSTGRES_DB: m_flow_db}
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries=5
    env:
      ENV: dev
      ENABLE_BACKEND_ACCESS_CONTROL: 'false'
      LLM_MODEL: ${{ secrets.OPENAI_MODEL }}
      LLM_ENDPOINT: ${{ secrets.OPENAI_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      GRAPH_DATABASE_PROVIDER: 'neo4j'
      VECTOR_DB_PROVIDER: 'pgvector'
      DB_PROVIDER: 'postgres'
      GRAPH_DATABASE_URL: bolt://localhost:7687
      GRAPH_DATABASE_USERNAME: neo4j
      GRAPH_DATABASE_PASSWORD: mflow-dev-neo4j
      DB_NAME: m_flow_db
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: m_flow
      DB_PASSWORD: m_flow
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "postgres"}

      - run: echo "Dependencies already installed in setup"
        name: "Confirm dependency resolution"

      - name: "Execute temporal graph — Neo4j / PGVector / Postgres"
        run: uv run python ./m_flow/tests/test_temporal_graph.py
