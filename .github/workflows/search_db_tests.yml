# ┌──────────────────────────────────────────────────────────────────────────┐
# │ M-Flow CI Pipeline: Search-Layer Backend Matrix                         │
# │                                                                          │
# │ Validates the search subsystem across graph × vector × relational       │
# │ backend combinations. SQLite-based combos use a consolidated matrix     │
# │ job; Postgres-based combos run independently due to service container   │
# │ requirements.                                                            │
# │                                                                          │
# │ Owner: M-Flow Platform Engineering                                      │
# └──────────────────────────────────────────────────────────────────────────┘
name: "search-db | Search-Layer Backend Matrix"

permissions: {contents: read}

on:
  workflow_call:
    inputs:
      databases:
        type: string
        default: "all"
        required: false
        description: "Backend combos to test (comma-separated or 'all')"

concurrency:
  group: mflow-search-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── SQLite-based search matrix (Kuzu or Neo4j + LanceDB + SQLite) ──────
  sqlite-search-matrix:
    if: >-
      ${{ inputs.databases == 'all'
       || contains(inputs.databases, format('{0}/lance/sqlite', matrix.graph_backend)) }}
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    name: "Search — ${{ matrix.graph_backend }} / LanceDB / SQLite"
    defaults: {run: {shell: bash}}
    strategy:
      fail-fast: false
      matrix:
        graph_backend: [kuzu, neo4j]
    env:
      ENV: 'dev'
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      GRAPH_DATABASE_PROVIDER: ${{ matrix.graph_backend }}
      VECTOR_DB_PROVIDER: 'lancedb'
      DB_PROVIDER: 'sqlite'
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - uses: ./.github/actions/setup_neo4j
        name: "Provision Neo4j with GDS extension"
        id: neo4j_svc
        if: matrix.graph_backend == 'neo4j'

      - run: echo "Dependencies already installed in setup"
        name: "Confirm dependency resolution"
        if: matrix.graph_backend == 'kuzu'

      - name: "Execute search tests — ${{ matrix.graph_backend }} / LanceDB / SQLite"
        env:
          ENABLE_BACKEND_ACCESS_CONTROL: >-
            ${{ matrix.graph_backend == 'neo4j' && 'false' || '' }}
          GRAPH_DATABASE_URL: >-
            ${{ matrix.graph_backend == 'neo4j' && steps.neo4j_svc.outputs.neo4j-url || '' }}
          GRAPH_DATABASE_USERNAME: >-
            ${{ matrix.graph_backend == 'neo4j' && steps.neo4j_svc.outputs.neo4j-username || '' }}
          GRAPH_DATABASE_PASSWORD: >-
            ${{ matrix.graph_backend == 'neo4j' && steps.neo4j_svc.outputs.neo4j-password || '' }}
        run: uv run python ./m_flow/tests/test_search_db.py

  # ── Kuzu / PGVector / Postgres search ──────────────────────────────────
  pg-kuzu-search:
    if: ${{ inputs.databases == 'all' || contains(inputs.databases, 'kuzu/pgvector/postgres') }}
    timeout-minutes: 25
    runs-on: ubuntu-22.04
    name: "Search — Kuzu / PGVector / Postgres"
    defaults: {run: {shell: bash}}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: m_flow, POSTGRES_DB: m_flow_db}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    env:
      ENV: dev
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      GRAPH_DATABASE_PROVIDER: 'kuzu'
      VECTOR_DB_PROVIDER: 'pgvector'
      ENABLE_BACKEND_ACCESS_CONTROL: 'false'
      DB_PROVIDER: 'postgres'
      DB_NAME: 'm_flow_db'
      DB_HOST: '127.0.0.1'
      DB_PORT: 5432
      DB_USERNAME: m_flow
      DB_PASSWORD: m_flow
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "postgres"}

      - run: echo "Dependencies already installed in setup"
        name: "Confirm dependency resolution"

      - name: "Execute search tests — Kuzu / PGVector / Postgres"
        run: uv run python ./m_flow/tests/test_search_db.py

  # ── Neo4j / PGVector / Postgres search ─────────────────────────────────
  pg-neo4j-search:
    if: ${{ inputs.databases == 'all' || contains(inputs.databases, 'neo4j/pgvector/postgres') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    name: "Search — Neo4j / PGVector / Postgres"
    defaults: {run: {shell: bash}}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env: {POSTGRES_USER: m_flow, POSTGRES_PASSWORD: m_flow, POSTGRES_DB: m_flow_db}
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries=5
    env:
      ENV: dev
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      GRAPH_DATABASE_PROVIDER: 'neo4j'
      VECTOR_DB_PROVIDER: 'pgvector'
      DB_PROVIDER: 'postgres'
      ENABLE_BACKEND_ACCESS_CONTROL: 'false'
      DB_NAME: m_flow_db
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: m_flow
      DB_PASSWORD: m_flow
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}", extra-dependencies: "postgres"}

      - uses: ./.github/actions/setup_neo4j
        name: "Provision Neo4j with GDS extension"
        id: neo4j_svc

      - run: echo "Dependencies already installed in setup"
        name: "Confirm dependency resolution"

      - name: "Execute search tests — Neo4j / PGVector / Postgres"
        env:
          GRAPH_DATABASE_URL: ${{ steps.neo4j_svc.outputs.neo4j-url }}
          GRAPH_DATABASE_USERNAME: ${{ steps.neo4j_svc.outputs.neo4j-username }}
          GRAPH_DATABASE_PASSWORD: ${{ steps.neo4j_svc.outputs.neo4j-password }}
        run: uv run python ./m_flow/tests/test_search_db.py
