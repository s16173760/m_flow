# M-Flow — MCP server image: Docker Hub multi-arch (self-hosted builder).
# -----------------------------------------------------------------------------
# Disk cleanup + Buildx root under /tmp; image m_flow/m_flow-mcp. Layout is
# intentionally distinct from generic docker-publish templates.
# -----------------------------------------------------------------------------
name: publish | MCP Docker Hub Image

concurrency:
  cancel-in-progress: true
  group: mflow-mcp-hub-${{ github.ref }}

on:
  release:
    types: [published]

permissions: { contents: read }

env:
  MCP_IMAGE: m_flow/m_flow-mcp
  MCP_DOCKERFILE: m_flow-mcp/Dockerfile

jobs:
  mflow_mcp_multiarch_publish:
    name: Build and publish MCP Docker image
    runs-on:
      group: Default
      labels: [docker_build_runner]
    timeout-minutes: 45

    steps:
      # ── Free disk space ────────────────────────────────────
      - name: Prune host SDK dirs before image build
        run: |
          echo "── Disk usage before cleanup ──"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          echo "── Disk usage after cleanup ──"
          df -h /

      # ── Source ─────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Buildx with relocated state ───────────────────────
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --root /tmp/buildkit

      # ── Registry auth ─────────────────────────────────────
      - name: Docker Hub credential handshake
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Derive OCI metadata ───────────────────────────────
      - name: Compute MCP image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MCP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build + Publish ───────────────────────────────────
      - name: buildx push MCP Dockerfile (amd64 + arm64)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.MCP_DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags:  ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.MCP_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.MCP_IMAGE }}:buildcache,mode=max

      # ── Summary ───────────────────────────────────────────
      - name: Append MCP digest table to Step Summary
        run: |
          {
            echo "## MCP Image Publish Results"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image | \`${{ env.MCP_IMAGE }}\` |"
            echo "| Digest | \`${{ steps.push.outputs.digest }}\` |"
            echo "| Platforms | linux/amd64, linux/arm64 |"
          } >> "$GITHUB_STEP_SUMMARY"
