# M-Flow — Docker Hub: multi-arch publish for m_flow/m_flow.
# -----------------------------------------------------------------------------
# Tagging via docker/metadata-action; layer cache on registry. This file’s
# structure (concurrency key order, job id) is M-Flow-specific housekeeping.
# -----------------------------------------------------------------------------
name: publish | Docker Hub Image

concurrency:
  cancel-in-progress: true
  group: mflow-hub-main-${{ github.ref }}

on:
  release:
    types: [published]

permissions: { contents: read, packages: write }

env:
  IMAGE_REPO: m_flow/m_flow

jobs:
  mflow_registry_multiarch_push:
    name: Publish multi-arch Docker image to Docker Hub
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Buildx ───────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── Registry authentication ──────────────────────────
      - name: Open Docker Hub session
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Derive OCI tags and labels ───────────────────────
      - name: Resolve OCI tag / label set
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build + Push ─────────────────────────────────────
      - name: docker buildx push (amd64 + arm64)
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max

      # ── Summary ──────────────────────────────────────────
      - name: Record image digest in GitHub Step Summary
        run: |
          {
            echo "## Docker Publish Results"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image | \`${{ env.IMAGE_REPO }}\` |"
            echo "| Digest | \`${{ steps.push.outputs.digest }}\` |"
            echo "| Platforms | linux/amd64, linux/arm64 |"
          } >> "$GITHUB_STEP_SUMMARY"
