# M-flow CI — validate S3-backed file storage against a real AWS bucket.
# Requires the AWS dev-user credentials stored in GitHub Secrets.
name: integration-gate | S3 File Storage

on:
  workflow_call:

permissions:
  contents: read

env:
  RUNTIME__LOG_LEVEL: ERROR
  ENV: dev

jobs:
  s3-storage:
    name: Run S3 storage integration tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    env:
      # --- storage ---
      STORAGE_BACKEND: s3
      ENABLE_BACKEND_ACCESS_CONTROL: "true"
      AWS_REGION: eu-west-1
      AWS_ENDPOINT_URL: https://s3-eu-west-1.amazonaws.com
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_DEV_USER_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_DEV_USER_SECRET_KEY }}
      STORAGE_BUCKET_NAME: github-runner-m_flow-tests
      # --- LLM ---
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      # --- embeddings ---
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap M-flow environment
        uses: ./.github/actions/m_flow_setup
        with:
          python-version: "3.11.x"
          extra-dependencies: "aws"

      - name: Execute S3 storage test
        run: uv run python ./m_flow/tests/test_s3_file_storage.py
