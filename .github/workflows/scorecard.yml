# ──────────────────────────────────────────────────────────────
# M-flow — OpenSSF Scorecard (supply-chain security audit)
#
# Runs the OSSF Scorecard checks weekly and on every push to
# `main`. Results are:
#   • published to the OpenSSF REST API (badge eligibility),
#   • uploaded as a SARIF artifact, and
#   • sent to GitHub Code Scanning for dashboard visibility.
#
# See: https://securityscorecards.dev
# ──────────────────────────────────────────────────────────────
name: security | OpenSSF Scorecard

on:
  branch_protection_rule:      # re-evaluate when rules change
  schedule:
    - cron: "20 10 * * 3"      # every Wednesday at 10:20 UTC
  push:
    branches: [main]

# Minimal default — jobs override where needed
permissions: read-all

jobs:
  scorecard:
    name: OSSF Scorecard Analysis
    runs-on: ubuntu-22.04
    if: >-
      github.ref_name == github.event.repository.default_branch
      || github.event_name == 'pull_request'

    permissions:
      security-events: write   # upload SARIF to code-scanning
      id-token: write          # OIDC for publish_results badge

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # ── 2. Run Scorecard ─────────────────────────────────
      - name: Execute OpenSSF Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # ── 3. Persist SARIF artefact ────────────────────────
      - name: Store SARIF report as build artefact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      # ── 4. Feed GitHub Code Scanning ─────────────────────
      - name: Upload SARIF to Code Scanning dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
