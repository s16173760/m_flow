# M-Flow — GitGuardian secret scanning policy
---
version: v1

secret-scan:
  excluded-paths:
    - ".env.template"
    - "m_flow/tests/**"
    - "examples/**"
    - ".github/workflows/*.yml"

  excluded-detectors:
    - "Generic Password"
    - "Generic High Entropy Secret"

  paths-ignore:
    - path: ".env.template"
      comment: "Placeholder values only — no real credentials."
    - path: "docker-compose.yml"
      comment: "Local dev defaults (neo4j/mflow-dev-neo4j, postgres mflow_user/mflow_dev_pw)."
    - path: "deployment/helm/docker-compose-helm.yml"
      comment: "Helm local testing defaults (mflow_user/mflow_dev_pw)."
