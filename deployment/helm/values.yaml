# M-Flow Helm values
# Override these in your own values.yaml or via --set flags.

backend:
  image: "FlowElement-ai/m_flow:latest"
  port: 8000
  env:
    HOST: "0.0.0.0"
    ENVIRONMENT: "local"
    PYTHONPATH: "/opt/m_flow"
  resources:
    cpu: "6.0"
    memory: "12Gi"

database:
  image: "pgvector/pgvector:pg17"
  port: 5432
  env:
    POSTGRES_USER: "mflow_user"
    POSTGRES_PASSWORD: "mflow_dev_pw"
    POSTGRES_DB: "mflow_helm"
  storage: "10Gi"
